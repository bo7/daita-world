name: daita-web

services:

  plausible:
    image: ghcr.io/plausible/community-edition:v2.1
    restart: unless-stopped
    command: sh -c "sleep 10 && /entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    ports:
      - "127.0.0.1:8230:8000"
    environment:
      - BASE_URL=https://daita-crafter.com
      - SECRET_KEY_BASE=${PLAUSIBLE_SECRET_KEY_BASE}
      - DATABASE_URL=postgres://plausible:${PLAUSIBLE_DB_PASSWORD}@plausible_db:5432/plausible
      - DISABLE_REGISTRATION=true
    depends_on:
      plausible_db:
        condition: service_healthy
    networks:
      - internal

  plausible_db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=plausible
      - POSTGRES_USER=plausible
      - POSTGRES_PASSWORD=${PLAUSIBLE_DB_PASSWORD}
    volumes:
      - plausible_db_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plausible"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:8231:80"
    volumes:
      - ./astro-dist:/usr/share/nginx/html:ro
      - ./nginx/conf.d/web.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  ollama-bridge:
    build: ./ollama-bridge
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    environment:
      - OLLAMA_HOST=http://10.200.0.11:11434
      - OLLAMA_MODEL=qwen3:235b
      - SITE_ROOT=/site
      - SITE_URL=https://hands.trembling-hands.com
      - SB_URL=https://imuhzzxnkrmiwlccraff.supabase.co
      - SB_SECRET=${SB_SECRET}
      - TWENTY_API_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIwZTY2MjQyOS1iZWRkLTRhZmEtYjg2NC04ZTUyMThlMDJmMDMiLCJ0eXBlIjoiQVBJX0tFWSIsIndvcmtzcGFjZUlkIjoiMGU2NjI0MjktYmVkZC00YWZhLWI4NjQtOGU1MjE4ZTAyZjAzIiwiaWF0IjoxNzcyMzYxNTQzLCJleHAiOjQ5MjU5NjE1NDIsImp0aSI6IjMzMTZhY2Q5LTA0NDMtNDhkMi04MWM0LTA0NzYyMzVmZDg2MCJ9.rJjhVZc-NNoknQXipoeljimK52khdM0E_iUIW1NB3uA
      - MLX_HOST=http://10.200.0.12:8082
      - RESEND_KEY=re_XiZhd9Ct_A86zNzeX4aRPFcwZF79TjWRC
