name: daita-web

services:

  plausible:
    image: ghcr.io/plausible/community-edition:v2.1
    restart: unless-stopped
    command: sh -c "sleep 10 && /entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    ports:
      - "127.0.0.1:8230:8000"
    environment:
      - BASE_URL=${SITE_URL}
      - SECRET_KEY_BASE=${PLAUSIBLE_SECRET_KEY_BASE}
      - DATABASE_URL=postgres://plausible:${PLAUSIBLE_DB_PASSWORD}@plausible_db:5432/plausible
      - DISABLE_REGISTRATION=true
    depends_on:
      plausible_db:
        condition: service_healthy
    networks:
      - internal

  plausible_db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=plausible
      - POSTGRES_USER=plausible
      - POSTGRES_PASSWORD=${PLAUSIBLE_DB_PASSWORD}
    volumes:
      - plausible_db_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plausible"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:8231:80"
    volumes:
      - ./src:/usr/share/nginx/html:ro
      - ./nginx/conf.d/web.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  ollama-bridge:
    build: ./ollama-bridge
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - SITE_ROOT=/site
      - SITE_URL=${SITE_URL}
      - SB_URL=${SB_URL}
      - SB_SECRET=${SB_SECRET}
      - RESEND_KEY=${RESEND_KEY}
    volumes:
      - ./src:/site
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  plausible_db_data:

networks:
  internal:
    driver: bridge
    internal: true
