<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — DAITA-CRAFTER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --blue-600:#0078d4;--blue-700:#106ebe;--blue-50:#f0f6fd;--blue-200:#b0d0f0;
    --text-900:#0a1628;--text-700:#1e3a5f;--text-500:#4a6580;--text-300:#8fafc8;
    --white:#ffffff;--surface:#f7fbff;--border:#d0e4f4;--error:#c0392b;--success:#1a7a4a;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--surface);color:var(--text-900);min-height:100vh;display:flex;flex-direction:column;}
  nav{display:flex;align-items:center;justify-content:space-between;padding:0 64px;height:72px;border-bottom:1px solid var(--border);background:var(--white);position:sticky;top:0;z-index:100;}
  .logo{font-size:15px;font-weight:600;letter-spacing:0.06em;color:var(--text-900);text-transform:uppercase;text-decoration:none;}
  .logo-dot{display:inline-block;width:6px;height:6px;background:var(--blue-600);border-radius:50%;margin:0 4px;vertical-align:middle;position:relative;top:-1px;}
  .nav-link{font-size:14px;color:var(--text-500);text-decoration:none;transition:color 0.2s;}
  .nav-link:hover{color:var(--blue-600);}
  .page-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:64px 24px;}
  .auth-card{background:var(--white);border:1px solid var(--border);width:100%;max-width:400px;padding:48px;}
  .auth-eyebrow{font-size:11px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:var(--blue-600);background:var(--blue-50);border:1px solid var(--blue-200);padding:4px 12px;display:inline-block;margin-bottom:24px;}
  .auth-title{font-family:'Instrument Serif',serif;font-size:32px;font-weight:400;line-height:1.2;margin-bottom:8px;}
  .auth-subtitle{font-size:14px;color:var(--text-500);line-height:1.6;margin-bottom:32px;font-weight:300;}
  .form-group{margin-bottom:18px;}
  label{display:block;font-size:13px;font-weight:500;color:var(--text-700);margin-bottom:7px;}
  input[type=email],input[type=password]{width:100%;padding:11px 14px;border:1px solid var(--border);background:var(--surface);font-family:inherit;font-size:14px;color:var(--text-900);outline:none;transition:border-color 0.2s;}
  input:focus{border-color:var(--blue-600);background:var(--white);}
  .btn-primary{width:100%;padding:13px;background:var(--blue-600);color:var(--white);font-family:inherit;font-size:14px;font-weight:500;border:none;cursor:pointer;transition:background 0.2s;margin-top:6px;}
  .btn-primary:hover:not(:disabled){background:var(--blue-700);}
  .btn-primary:disabled{opacity:0.6;cursor:not-allowed;}
  .msg{padding:14px 16px;font-size:13px;line-height:1.6;margin-top:16px;border-left:3px solid;}
  .msg.success{color:var(--success);background:#f0faf5;border-color:var(--success);}
  .msg.error{color:var(--error);background:#fdf2f2;border-color:var(--error);}
  .msg.info{color:#0050a0;background:var(--blue-50);border-color:var(--blue-200);}
  .auth-footer{margin-top:24px;padding-top:20px;border-top:1px solid var(--border);font-size:13px;color:var(--text-500);}
  .auth-footer a{color:var(--blue-600);text-decoration:none;}
  .auth-footer a:hover{text-decoration:underline;}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">DAITA<span class="logo-dot"></span>CRAFTER</a>
  <a href="/register.html" class="nav-link">Request access</a>
</nav>
<div class="page-wrap">
  <div class="auth-card">
    <span class="auth-eyebrow">Partner Portal</span>
    <h1 class="auth-title">Sign In</h1>
    <p class="auth-subtitle">Access CV downloads and partner materials.</p>
    <div id="banner"></div>
    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@company.com" required>
      </div>
      <div class="form-group">
        <label for="pw">Password</label>
        <input type="password" id="pw" placeholder="Your password" required>
      </div>
      <button type="submit" class="btn-primary" id="submit-btn">Sign In</button>
      <div id="msg"></div>
    </form>
    <div class="auth-footer">No account yet? <a href="/register.html">Request access</a></div>
  </div>
</div>
<script>
const SUPABASE_URL = 'https://imuhzzxnkrmiwlccraff.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImltdWh6enhua3JtaXdsY2NyYWZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5MDE0ODEsImV4cCI6MjA4NzQ3NzQ4MX0.zsrIn4g53_5raGUmxTuIu68KX9AmsWOic70uXa8Hrqk';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const msgEl = document.getElementById('msg');
const bannerEl = document.getElementById('banner');
const btn = document.getElementById('submit-btn');

function showMsg(html, type) { msgEl.innerHTML = `<div class="msg ${type}">${html}</div>`; }

const params = new URLSearchParams(window.location.search);
if (params.get('confirmed') === '1') {
  bannerEl.innerHTML = '<div class="msg success" style="margin-bottom:20px"><strong>Email confirmed.</strong> Your access request is pending approval. We\'ll notify you once it\'s granted.</div>';
}

document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const pw = document.getElementById('pw').value;
  btn.disabled = true; btn.textContent = 'Signing in…';

  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
  if (error) { showMsg(error.message, 'error'); btn.disabled = false; btn.textContent = 'Sign In'; return; }

  const { data: profile } = await sb.from('profiles').select('approved').eq('id', data.user.id).single();
  if (!profile || !profile.approved) {
    await sb.auth.signOut();
    showMsg('Your account is pending approval. You will be notified once access is granted.', 'info');
    btn.disabled = false; btn.textContent = 'Sign In';
    return;
  }
  window.location.href = '/portal.html';
});
</script>
</body>
</html>
