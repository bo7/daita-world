<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="'Plus Jakarta Sans', system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8fafc8"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0078d4"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0e7a45"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="560" fill="#f7fbff"/>

  <!-- Title -->
  <text x="40" y="44" font-size="13" font-weight="600" letter-spacing="0.1em" fill="#8fafc8" text-transform="uppercase">NETZWERKÜBERSICHT — SOS SERVER</text>

  <!-- ===== OFFICE ZONE ===== -->
  <rect x="32" y="64" width="340" height="440" rx="0" fill="white" stroke="#d0e4f4" stroke-width="1"/>
  <rect x="32" y="64" width="340" height="28" fill="#f0f6fd"/>
  <text x="48" y="82" font-size="11" font-weight="600" letter-spacing="0.08em" fill="#4a6580">IHR BÜRO</text>

  <!-- Server box -->
  <rect x="100" y="112" width="200" height="96" fill="white" stroke="#0078d4" stroke-width="1.5"/>
  <rect x="100" y="112" width="200" height="26" fill="#0078d4"/>
  <text x="200" y="129" font-size="11" font-weight="600" fill="white" text-anchor="middle">SOS SERVER</text>
  <text x="116" y="155" font-size="10" fill="#4a6580">Professionelle Unternehmens-</text>
  <text x="116" y="169" font-size="10" fill="#4a6580">hardware · mehrere VMs</text>
  <text x="116" y="183" font-size="10" fill="#1e3a5f" font-weight="500">leise · im Keller / Schrank</text>

  <!-- VPN shield on server -->
  <rect x="256" y="118" width="36" height="20" fill="#0e7a45" rx="0"/>
  <text x="274" y="131" font-size="9" font-weight="600" fill="white" text-anchor="middle">VPN</text>

  <!-- Workstations in office -->
  <rect x="56" y="250" width="100" height="64" fill="white" stroke="#d0e4f4" stroke-width="1"/>
  <text x="106" y="276" font-size="10" font-weight="500" fill="#0a1628" text-anchor="middle">Arbeitsplatz 1</text>
  <text x="106" y="290" font-size="9" fill="#8fafc8" text-anchor="middle">Netbook / Thin Client</text>
  <text x="106" y="304" font-size="9" fill="#4a6580" text-anchor="middle">Windows remote</text>

  <rect x="244" y="250" width="100" height="64" fill="white" stroke="#d0e4f4" stroke-width="1"/>
  <text x="294" y="276" font-size="10" font-weight="500" fill="#0a1628" text-anchor="middle">Arbeitsplatz 2</text>
  <text x="294" y="290" font-size="9" fill="#8fafc8" text-anchor="middle">Netbook / Thin Client</text>
  <text x="294" y="304" font-size="9" fill="#4a6580" text-anchor="middle">Windows remote</text>

  <!-- Printer -->
  <rect x="148" y="250" width="104" height="64" fill="white" stroke="#d0e4f4" stroke-width="1"/>
  <text x="200" y="272" font-size="10" font-weight="500" fill="#0a1628" text-anchor="middle">Drucker</text>
  <text x="200" y="286" font-size="9" fill="#8fafc8" text-anchor="middle">Freigabe über</text>
  <text x="200" y="300" font-size="9" fill="#4a6580" text-anchor="middle">den Server</text>

  <!-- Local network label -->
  <text x="200" y="354" font-size="10" fill="#8fafc8" text-anchor="middle">lokales Netzwerk (LAN)</text>
  <line x1="80" y1="360" x2="320" y2="360" stroke="#d0e4f4" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Connections server to devices -->
  <line x1="200" y1="208" x2="106" y2="250" stroke="#b0d0f0" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="200" y1="208" x2="200" y2="250" stroke="#b0d0f0" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="200" y1="208" x2="294" y2="250" stroke="#b0d0f0" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== INTERNET / VPN TUNNEL ===== -->
  <!-- VPN tunnel bar -->
  <rect x="400" y="180" width="100" height="200" fill="#f0faf5" stroke="#a3d9b8" stroke-width="1" rx="0"/>
  <text x="450" y="210" font-size="10" font-weight="600" fill="#0e7a45" text-anchor="middle">VPN</text>
  <text x="450" y="225" font-size="10" font-weight="600" fill="#0e7a45" text-anchor="middle">TUNNEL</text>
  <text x="450" y="248" font-size="9" fill="#4a6580" text-anchor="middle">verschlüsselt</text>
  <text x="450" y="261" font-size="9" fill="#4a6580" text-anchor="middle">Ende-zu-Ende</text>
  <text x="450" y="280" font-size="9" fill="#8fafc8" text-anchor="middle">von außen</text>
  <text x="450" y="293" font-size="9" fill="#8fafc8" text-anchor="middle">unsichtbar</text>
  <!-- lock icon approximation -->
  <rect x="436" y="308" width="28" height="20" rx="2" fill="none" stroke="#0e7a45" stroke-width="1.5"/>
  <path d="M442,308 v-6 a8,8 0 0 1 16,0 v6" fill="none" stroke="#0e7a45" stroke-width="1.5"/>
  <circle cx="450" cy="318" r="3" fill="#0e7a45"/>
  <line x1="450" y1="321" x2="450" y2="325" stroke="#0e7a45" stroke-width="1.5"/>

  <!-- Arrows through tunnel -->
  <line x1="372" y1="240" x2="400" y2="240" stroke="#0078d4" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="500" y1="300" x2="372" y2="300" stroke="#0078d4" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- ===== REMOTE WORKERS ===== -->
  <rect x="528" y="64" width="340" height="440" rx="0" fill="white" stroke="#d0e4f4" stroke-width="1"/>
  <rect x="528" y="64" width="340" height="28" fill="#f0f6fd"/>
  <text x="544" y="82" font-size="11" font-weight="600" letter-spacing="0.08em" fill="#4a6580">MITARBEITENDE — ÜBERALL</text>

  <!-- Remote MA 1 - home -->
  <rect x="548" y="112" width="140" height="80" fill="white" stroke="#d0e4f4" stroke-width="1"/>
  <text x="618" y="138" font-size="10" font-weight="500" fill="#0a1628" text-anchor="middle">Homeoffice</text>
  <text x="618" y="153" font-size="9" fill="#8fafc8" text-anchor="middle">Laptop / Netbook</text>
  <text x="618" y="167" font-size="9" fill="#4a6580" text-anchor="middle">greift auf Server zu</text>
  <text x="618" y="181" font-size="9" fill="#4a6580" text-anchor="middle">wie im Büro</text>

  <!-- Remote MA 2 - customer -->
  <rect x="708" y="112" width="140" height="80" fill="white" stroke="#d0e4f4" stroke-width="1"/>
  <text x="778" y="138" font-size="10" font-weight="500" fill="#0a1628" text-anchor="middle">Beim Kunden</text>
  <text x="778" y="153" font-size="9" fill="#8fafc8" text-anchor="middle">Laptop / Tablet</text>
  <text x="778" y="167" font-size="9" fill="#4a6580" text-anchor="middle">greift auf Server zu</text>
  <text x="778" y="181" font-size="9" fill="#4a6580" text-anchor="middle">wie im Büro</text>

  <!-- Remote MA 3 - mobile -->
  <rect x="548" y="220" width="300" height="80" fill="white" stroke="#d0e4f4" stroke-width="1"/>
  <text x="698" y="246" font-size="10" font-weight="500" fill="#0a1628" text-anchor="middle">Unterwegs / mobil</text>
  <text x="698" y="261" font-size="9" fill="#8fafc8" text-anchor="middle">Smartphone · Tablet · beliebiges Gerät</text>
  <text x="698" y="275" font-size="9" fill="#4a6580" text-anchor="middle">Verbindung läuft automatisch</text>
  <text x="698" y="289" font-size="9" fill="#4a6580" text-anchor="middle">sobald Gerät eingerichtet ist</text>

  <!-- Remote to tunnel arrows -->
  <line x1="548" y1="192" x2="500" y2="250" stroke="#0078d4" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-blue)"/>
  <line x1="708" y1="192" x2="500" y2="250" stroke="#0078d4" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-blue)"/>
  <line x1="548" y1="260" x2="500" y2="270" stroke="#0078d4" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-blue)"/>

  <!-- Server to tunnel arrow -->
  <line x1="300" y1="160" x2="400" y2="210" stroke="#0078d4" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Legend -->
  <rect x="40" y="422" width="840" height="64" fill="white" stroke="#d0e4f4" stroke-width="1"/>
  <line x1="64" y1="454" x2="100" y2="454" stroke="#0078d4" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="108" y="458" font-size="11" fill="#4a6580">Verschlüsselte VPN-Verbindung</text>
  <line x1="260" y1="454" x2="296" y2="454" stroke="#b0d0f0" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="304" y="458" font-size="11" fill="#4a6580">Lokales Netzwerk</text>
  <rect x="456" y="446" width="14" height="14" fill="#f0faf5" stroke="#a3d9b8" stroke-width="1"/>
  <text x="476" y="458" font-size="11" fill="#4a6580">VPN-Zone (Ende-zu-Ende verschlüsselt, von außen unsichtbar)</text>

  <!-- Footer note -->
  <text x="450" y="510" font-size="10" fill="#8fafc8" text-anchor="middle">Der Server ist aus dem Internet nicht erreichbar. Nur autorisierte Geräte können sich verbinden.</text>
</svg>

