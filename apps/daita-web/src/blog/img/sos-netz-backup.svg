<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="'Plus Jakarta Sans', system-ui, sans-serif">
  <defs>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0078d4"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0e7a45"/>
    </marker>
  </defs>

  <rect width="900" height="380" fill="#f7fbff"/>

  <!-- Title -->
  <text x="40" y="44" font-size="13" font-weight="600" letter-spacing="0.1em" fill="#8fafc8">BACKUP-PIPELINE — AUTOMATISCH · TÄGLICH · VERSCHLÜSSELT</text>

  <!-- ===== STAGE 1: Server lokal ===== -->
  <rect x="32" y="72" width="160" height="200" fill="white" stroke="#0078d4" stroke-width="1.5"/>
  <rect x="32" y="72" width="160" height="26" fill="#0078d4"/>
  <text x="112" y="89" font-size="10" font-weight="600" fill="white" text-anchor="middle">SOS SERVER</text>

  <text x="112" y="122" font-size="10" font-weight="500" fill="#0a1628" text-anchor="middle">Ihre Daten</text>
  <rect x="52" y="132" width="120" height="18" fill="#f0f6fd" stroke="#d0e4f4" stroke-width="1"/>
  <text x="112" y="145" font-size="9" fill="#4a6580" text-anchor="middle">Gemeinsame Dateien</text>
  <rect x="52" y="155" width="120" height="18" fill="#f0f6fd" stroke="#d0e4f4" stroke-width="1"/>
  <text x="112" y="168" font-size="9" fill="#4a6580" text-anchor="middle">Windows-Umgebungen</text>
  <rect x="52" y="178" width="120" height="18" fill="#f0f6fd" stroke="#d0e4f4" stroke-width="1"/>
  <text x="112" y="191" font-size="9" fill="#4a6580" text-anchor="middle">Konfigurationen</text>
  <rect x="52" y="201" width="120" height="18" fill="#f0f6fd" stroke="#d0e4f4" stroke-width="1"/>
  <text x="112" y="214" font-size="9" fill="#4a6580" text-anchor="middle">Branchensoftware-DB</text>

  <text x="112" y="246" font-size="9" fill="#8fafc8" text-anchor="middle">bei Ihnen vor Ort</text>
  <text x="112" y="260" font-size="8" fill="#8fafc8" text-anchor="middle">Keller / Schrank</text>

  <!-- STAGE 1 label -->
  <rect x="52" y="284" width="120" height="20" fill="#0078d4"/>
  <text x="112" y="298" font-size="9" font-weight="600" fill="white" text-anchor="middle">Stufe 1: Quelldaten</text>

  <!-- Arrow 1 -->
  <line x1="196" y1="172" x2="240" y2="172" stroke="#0078d4" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="218" y="162" font-size="8" fill="#4a6580" text-anchor="middle">täglich</text>
  <text x="218" y="185" font-size="8" fill="#4a6580" text-anchor="middle">automatisch</text>

  <!-- ===== STAGE 2: Dedup + Compression ===== -->
  <rect x="244" y="72" width="160" height="200" fill="white" stroke="#1e3a5f" stroke-width="1.5"/>
  <rect x="244" y="72" width="160" height="26" fill="#1e3a5f"/>
  <text x="324" y="89" font-size="10" font-weight="600" fill="white" text-anchor="middle">VERARBEITUNG</text>

  <text x="324" y="120" font-size="10" font-weight="500" fill="#0a1628" text-anchor="middle">Automatische Pipeline</text>

  <rect x="264" y="132" width="120" height="30" fill="#f0f6fd" stroke="#d0e4f4" stroke-width="1"/>
  <text x="324" y="149" font-size="9" fill="#1e3a5f" font-weight="500" text-anchor="middle">Deduplizierung</text>
  <text x="324" y="161" font-size="8" fill="#8fafc8" text-anchor="middle">nur Änderungen</text>

  <rect x="264" y="168" width="120" height="30" fill="#f0f6fd" stroke="#d0e4f4" stroke-width="1"/>
  <text x="324" y="185" font-size="9" fill="#1e3a5f" font-weight="500" text-anchor="middle">Komprimierung</text>
  <text x="324" y="197" font-size="8" fill="#8fafc8" text-anchor="middle">kleineres Volumen</text>

  <rect x="264" y="204" width="120" height="30" fill="#f0faf5" stroke="#a3d9b8" stroke-width="1"/>
  <text x="324" y="221" font-size="9" fill="#0e7a45" font-weight="500" text-anchor="middle">Verschlüsselung</text>
  <text x="324" y="233" font-size="8" fill="#0e7a45" text-anchor="middle">AES-256, Ihr Schlüssel</text>

  <text x="324" y="258" font-size="9" fill="#8fafc8" text-anchor="middle">läuft nachts</text>
  <text x="324" y="270" font-size="8" fill="#8fafc8" text-anchor="middle">ohne Unterbrechung</text>

  <rect x="264" y="284" width="120" height="20" fill="#1e3a5f"/>
  <text x="324" y="298" font-size="9" font-weight="600" fill="white" text-anchor="middle">Stufe 2: Aufbereitung</text>

  <!-- Arrow 2 -->
  <line x1="408" y1="172" x2="452" y2="172" stroke="#0e7a45" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="430" y="162" font-size="8" fill="#0e7a45" text-anchor="middle">sicher</text>
  <text x="430" y="185" font-size="8" fill="#0e7a45" text-anchor="middle">verschlüsselt</text>

  <!-- ===== STAGE 3: Cloud Storage ===== -->
  <rect x="456" y="72" width="160" height="200" fill="white" stroke="#0e7a45" stroke-width="1.5"/>
  <rect x="456" y="72" width="160" height="26" fill="#0e7a45"/>
  <text x="536" y="89" font-size="10" font-weight="600" fill="white" text-anchor="middle">CLOUD-SPEICHER</text>

  <text x="536" y="120" font-size="10" font-weight="500" fill="#0a1628" text-anchor="middle">Externes Backup</text>

  <text x="536" y="150" font-size="9" fill="#4a6580" text-anchor="middle">Verschlüsselt gespeichert</text>
  <text x="536" y="165" font-size="9" fill="#4a6580" text-anchor="middle">Nur mit Ihrem Schlüssel</text>
  <text x="536" y="180" font-size="9" fill="#4a6580" text-anchor="middle">lesbar — kein Dritter</text>

  <rect x="476" y="196" width="120" height="20" fill="#f0faf5" stroke="#a3d9b8" stroke-width="1"/>
  <text x="536" y="210" font-size="9" fill="#0e7a45" text-anchor="middle">täglich geprüft</text>

  <rect x="476" y="222" width="120" height="20" fill="#f0faf5" stroke="#a3d9b8" stroke-width="1"/>
  <text x="536" y="236" font-size="9" fill="#0e7a45" text-anchor="middle">30 Tage Versionshistorie</text>

  <text x="536" y="262" font-size="9" fill="#8fafc8" text-anchor="middle">geografisch getrennt</text>
  <text x="536" y="274" font-size="8" fill="#8fafc8" text-anchor="middle">vom lokalen Server</text>

  <rect x="476" y="284" width="120" height="20" fill="#0e7a45"/>
  <text x="536" y="298" font-size="9" font-weight="600" fill="white" text-anchor="middle">Stufe 3: Sicherung</text>

  <!-- Arrow 3 -->
  <line x1="620" y1="172" x2="664" y2="172" stroke="#8fafc8" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="642" y="162" font-size="8" fill="#4a6580" text-anchor="middle">im</text>
  <text x="642" y="185" font-size="8" fill="#4a6580" text-anchor="middle">Notfall</text>

  <!-- ===== STAGE 4: Restore ===== -->
  <rect x="668" y="72" width="200" height="200" fill="white" stroke="#d0e4f4" stroke-width="1.5"/>
  <rect x="668" y="72" width="200" height="26" fill="#f0f6fd"/>
  <text x="768" y="89" font-size="10" font-weight="600" fill="#1e3a5f" text-anchor="middle">WIEDERHERSTELLUNG</text>

  <text x="768" y="118" font-size="10" font-weight="500" fill="#0a1628" text-anchor="middle">Im Ernstfall</text>

  <text x="768" y="145" font-size="9" fill="#4a6580" text-anchor="middle">Beliebiger Zeitpunkt</text>
  <text x="768" y="160" font-size="9" fill="#4a6580" text-anchor="middle">der letzten 30 Tage</text>

  <rect x="688" y="174" width="160" height="20" fill="#f0faf5" stroke="#a3d9b8" stroke-width="1"/>
  <text x="768" y="188" font-size="9" fill="#0e7a45" text-anchor="middle">Einzelne Datei</text>

  <rect x="688" y="200" width="160" height="20" fill="#f0faf5" stroke="#a3d9b8" stroke-width="1"/>
  <text x="768" y="214" font-size="9" fill="#0e7a45" text-anchor="middle">Ganzer Server-Zustand</text>

  <rect x="688" y="226" width="160" height="20" fill="#f0faf5" stroke="#a3d9b8" stroke-width="1"/>
  <text x="768" y="240" font-size="9" fill="#0e7a45" text-anchor="middle">Auch ohne uns möglich</text>

  <text x="768" y="262" font-size="9" fill="#8fafc8" text-anchor="middle">Schlüssel gehört Ihnen</text>

  <rect x="688" y="284" width="160" height="20" fill="#4a6580"/>
  <text x="768" y="298" font-size="9" font-weight="600" fill="white" text-anchor="middle">Stufe 4: Restore</text>

  <!-- Monitoring note at bottom -->
  <rect x="32" y="328" width="836" height="36" fill="white" stroke="#d0e4f4" stroke-width="1"/>
  <text x="450" y="344" font-size="10" font-weight="500" fill="#1e3a5f" text-anchor="middle">Wir überwachen jeden Backup-Lauf automatisch — bei Fehlern erhalten wir sofort eine Meldung, bevor Sie es bemerken.</text>
  <text x="450" y="358" font-size="9" fill="#8fafc8" text-anchor="middle">Der Restore-Prozess wird regelmäßig getestet. Ein Backup, das nie wiederhergestellt wurde, ist kein Backup.</text>
</svg>

